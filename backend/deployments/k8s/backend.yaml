---
# ============================================================
# Namespace
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: msp
  labels:
    app.kubernetes.io/managed-by: kubectl

---
# ============================================================
# Secret (sensitive env vars — use Sealed Secrets or Vault in prod)
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: msp-backend-secrets
  namespace: msp
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change_me_in_production"
  MONGODB_URI: "mongodb://app_user:change_me@mongodb:27017/microservice_db?authSource=admin"
  REDIS_PASSWORD: "change_me_in_production"
  JWT_ACCESS_SECRET: "change_me_to_a_strong_secret_min_32_chars"
  JWT_REFRESH_SECRET: "change_me_to_another_strong_secret_32_chars"

---
# ============================================================
# ConfigMap (non-sensitive env vars)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: msp-backend-config
  namespace: msp
data:
  APP_ENV:                    "production"
  APP_NAME:                   "microservice-platform"
  APP_LOG_LEVEL:              "info"
  GRPC_HOST:                  "0.0.0.0"
  GRPC_PORT:                  "50051"
  HTTP_HOST:                  "0.0.0.0"
  HTTP_PORT:                  "8080"
  POSTGRES_HOST:              "postgres-service"
  POSTGRES_PORT:              "5432"
  POSTGRES_DB:                "microservice_db"
  POSTGRES_USER:              "app_user"
  POSTGRES_SSL_MODE:          "require"
  POSTGRES_MAX_OPEN_CONNS:    "25"
  POSTGRES_MAX_IDLE_CONNS:    "10"
  MONGODB_DB:                 "microservice_db"
  REDIS_HOST:                 "redis-service"
  REDIS_PORT:                 "6379"
  JWT_ISSUER:                 "microservice-platform"
  JWT_ACCESS_EXPIRY:          "15m"
  JWT_REFRESH_EXPIRY:         "168h"
  TLS_ENABLED:                "false"
  RATE_LIMIT_ENABLED:         "true"
  RATE_LIMIT_RPS:             "100"
  RATE_LIMIT_BURST:           "200"
  CORS_ALLOWED_ORIGINS:       "https://yourdomain.com"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger-collector:4317"

---
# ============================================================
# Backend Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: msp-backend
  namespace: msp
  labels:
    app: msp-backend
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: msp-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # Zero-downtime deploys
  template:
    metadata:
      labels:
        app: msp-backend
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "9090"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: msp-backend-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      terminationGracePeriodSeconds: 60

      containers:
        - name: backend
          image: microservice-platform/backend:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          envFrom:
            - configMapRef:
                name: msp-backend-config
            - secretRef:
                name: msp-backend-secrets

          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"

          # liveness: can the process receive traffic?
          livenessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:50051"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          # readiness: should traffic be sent to this pod?
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: msp-backend

---
# ============================================================
# Backend Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: msp-backend-service
  namespace: msp
  labels:
    app: msp-backend
spec:
  selector:
    app: msp-backend
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP

---
# ============================================================
# Horizontal Pod Autoscaler
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: msp-backend-hpa
  namespace: msp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: msp-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ============================================================
# Service Account
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: msp-backend-sa
  namespace: msp
  labels:
    app: msp-backend

---
# ============================================================
# Ingress (NGINX ingress controller)
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: msp-ingress
  namespace: msp
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.yourdomain.com
        - grpc.yourdomain.com
      secretName: msp-tls
  rules:
    - host: api.yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: msp-backend-service
                port:
                  name: http
    - host: grpc.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: msp-backend-service
                port:
                  name: grpc
