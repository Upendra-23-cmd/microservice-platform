syntax = "proto3";

package product.v1;

option go_package = "github.com/yourorg/microservice-platform/backend/internal/grpc/pb/product/v1;productv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/api/annotations.proto";
import "validate/validate.proto";

// ============================================================
// MESSAGES
// ============================================================

message Product {
  string id          = 1;
  string name        = 2;
  string description = 3;
  double price       = 4;
  int32  stock       = 5;
  string category    = 6;
  repeated string tags = 7;
  map<string, string> metadata = 8; // Stored in MongoDB
  bool   is_active   = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message CreateProductRequest {
  string name        = 1 [(validate.rules).string.min_len = 1];
  string description = 2;
  double price       = 3 [(validate.rules).double.gt = 0];
  int32  stock       = 4 [(validate.rules).int32.gte = 0];
  string category    = 5;
  repeated string tags = 6;
  map<string, string> metadata = 7;
}

message CreateProductResponse {
  Product product = 1;
}

message GetProductRequest {
  string id = 1;
}

message GetProductResponse {
  Product product = 1;
}

message UpdateProductRequest {
  string id          = 1;
  string name        = 2;
  string description = 3;
  double price       = 4;
  int32  stock       = 5;
  string category    = 6;
  repeated string tags = 7;
  map<string, string> metadata = 8;
}

message UpdateProductResponse {
  Product product = 1;
}

message DeleteProductRequest {
  string id = 1;
}

message ListProductsRequest {
  int32  page      = 1;
  int32  page_size = 2 [(validate.rules).int32 = {gte: 1, lte: 100}];
  string category  = 3;
  string search    = 4;
  double min_price = 5;
  double max_price = 6;
  string sort_by   = 7;
  string order     = 8;
}

message ListProductsResponse {
  repeated Product products = 1;
  int64            total    = 2;
  int32            page     = 3;
  int32            pages    = 4;
}

message UpdateStockRequest {
  string id       = 1;
  int32  quantity = 2;
  string op       = 3; // "increment" | "decrement" | "set"
}

message UpdateStockResponse {
  string id    = 1;
  int32  stock = 2;
}

// ============================================================
// SERVICE
// ============================================================

service ProductService {
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse) {
    option (google.api.http) = {
      post: "/api/v1/products"
      body: "*"
    };
  }

  rpc GetProduct(GetProductRequest) returns (GetProductResponse) {
    option (google.api.http) = {
      get: "/api/v1/products/{id}"
    };
  }

  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse) {
    option (google.api.http) = {
      put: "/api/v1/products/{id}"
      body: "*"
    };
  }

  rpc DeleteProduct(DeleteProductRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/products/{id}"
    };
  }

  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse) {
    option (google.api.http) = {
      get: "/api/v1/products"
    };
  }

  rpc UpdateStock(UpdateStockRequest) returns (UpdateStockResponse) {
    option (google.api.http) = {
      patch: "/api/v1/products/{id}/stock"
      body: "*"
    };
  }
}
